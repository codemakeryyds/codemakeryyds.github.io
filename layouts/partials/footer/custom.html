<script src="/live2d/vendor/L2Dwidget.min.js"></script>
<script>
(() => {
    if (
        window.matchMedia("(prefers-reduced-motion: reduce)").matches ||
        typeof window.L2Dwidget === "undefined"
    ) return;

    const compactWaifu = window.matchMedia("(max-width: 960px)").matches;
    const waifuMessages = [
        "该学习了，芝士雪豹。",
        "今天也要把笔记整理好。",
        "别光看我，文章也看看。",
        "鼠标放错地方了？",
        "都结束了，又开始了。",
        "欢迎，路行者。"
    ];
    let waifuDialogTimer = 0;

    function waifuSay(text, duration = 4200) {
        const dialog = document.querySelector("#live2d-widget .live2d-widget-dialog");
        if (!dialog) return;

        dialog.textContent = text;
        dialog.style.opacity = "1";
        window.clearTimeout(waifuDialogTimer);
        waifuDialogTimer = window.setTimeout(() => {
            dialog.style.opacity = "0";
        }, duration);
    }

    function randomMessage() {
        const index = Math.floor(Math.random() * waifuMessages.length);
        waifuSay(waifuMessages[index]);
    }

    function downloadFrame() {
        try {
            if (typeof window.L2Dwidget.downloadFrame === "function") {
                window.L2Dwidget.downloadFrame();
                waifuSay("截图保存好了。");
                return;
            }
        } catch (error) {
            console.warn("Live2D screenshot failed:", error);
        }

        waifuSay("截图功能暂时不可用。");
    }

    function hideWaifu() {
        waifuSay("我先下班了，刷新页面还能回来。", 900);
        window.setTimeout(() => {
            const widget = document.getElementById("live2d-widget");
            const toolbar = document.getElementById("waifu-toolbar");
            if (widget) widget.style.display = "none";
            if (toolbar) toolbar.style.display = "none";
        }, 900);
    }

    function icon(name) {
        const icons = {
            home: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg>',
            message: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/><path d="M8 9h8M8 13h5"/></svg>',
            camera: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 4 16 7h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h3l1.5-3z"/><circle cx="12" cy="13" r="3"/></svg>',
            info: '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 10v6M12 7h.01"/></svg>',
            close: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m18 6-12 12M6 6l12 12"/></svg>'
        };

        return icons[name];
    }

    function createToolbarButton(label, iconName, action) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "waifu-toolbar__button";
        button.dataset.waifuLabel = label;
        button.setAttribute("aria-label", label);
        button.innerHTML = icon(iconName);
        button.addEventListener("mousedown", (event) => event.stopPropagation());
        button.addEventListener("mouseup", (event) => event.stopPropagation());
        button.addEventListener("touchstart", (event) => event.stopPropagation(), { passive: true });
        button.addEventListener("touchend", (event) => event.stopPropagation());
        button.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            action(event);
        });
        return button;
    }

    function setupWaifuToolbar() {
        if (compactWaifu) return;
        if (document.getElementById("waifu-toolbar")) return;

        const toolbar = document.createElement("nav");
        toolbar.id = "waifu-toolbar";
        toolbar.setAttribute("aria-label", "看板娘工具栏");
        toolbar.append(
            createToolbarButton("回到首页", "home", () => {
                window.location.href = "/";
            }),
            createToolbarButton("随机台词", "message", randomMessage),
            createToolbarButton("截图", "camera", downloadFrame),
            createToolbarButton("关于本站", "info", () => {
                waifuSay("这里是理塘丁真的个人技术博客。");
            }),
            createToolbarButton("隐藏看板娘", "close", hideWaifu)
        );

        document.body.appendChild(toolbar);
    }

    window.L2Dwidget.on("create-container", () => {
        window.setTimeout(setupWaifuToolbar, 120);
    });

    window.L2Dwidget.on("create-dialog", () => {
        window.setTimeout(() => waifuSay("都结束了，又开始了。", 3000), 350);
    });

    window.L2Dwidget.init({
        model: {
            jsonPath: "/live2d/kp31/normal/model.json",
            scale: 1
        },
        display: {
            position: "right",
            width: 270,
            height: 410,
            hOffset: compactWaifu ? 40 : 18,
            vOffset: compactWaifu ? 44 : -18
        },
        mobile: {
            show: true,
            scale: 1
        },
        react: {
            opacityDefault: 0.9,
            opacityOnHover: 1
        },
        dialog: {
            enable: true,
            script: {
                "every idle 12s": "该学习了，芝士雪豹",
                "hover .article-list": "别光看我，文章也看看。",
                "hover .menu": "要去哪里逛逛？",
                "tap body": "该学习了，芝士雪豹",
                "tap face": "鼠标放这里，是要找我吗？"
            }
        }
    });
})();
</script>
<script>
(() => {
    const canvas = document.getElementById("site-particles");
    if (
        !canvas ||
        window.matchMedia("(prefers-reduced-motion: reduce)").matches
    ) return;

    const ctx = canvas.getContext("2d");
    if (!ctx) return;

    const pointer = { x: 0, y: 0, active: false };
    let width = 0;
    let height = 0;
    let particles = [];
    let ripples = [];
    let frame = 0;
    let collisionHeat = 0;

    function mobileMode() {
        return window.matchMedia("(max-width: 767px)").matches ||
            window.matchMedia("(pointer: coarse)").matches;
    }

    function motionSettings() {
        const mobile = mobileMode();

        return {
            mobile,
            minCount: mobile ? 42 : 86,
            maxCount: mobile ? 74 : 170,
            density: mobile ? 8500 : 9000,
            baseSpeed: mobile ? 0.32 : 0.48,
            wanderMin: mobile ? 0.002 : 0.003,
            wanderMax: mobile ? 0.0045 : 0.008,
            pointerRange: mobile ? 160 : 230,
            pointerForce: mobile ? 0.045 : 0.07,
            pointerLineDistance: mobile ? 150 : 210,
            linkDistance: mobile ? 108 : 145,
            explosionRadius: mobile ? 240 : 360,
            explosionForce: mobile ? 5.8 : 9.5,
            maxSpeed: mobile ? 2.55 : 3.8,
            minCollisionDistance: mobile ? 12 : 15,
            collisionPush: mobile ? 0.22 : 0.32,
            rippleStep: mobile ? 5.5 : 8,
            rippleHeatStep: mobile ? 1.6 : 3
        };
    }

    function scheme() {
        return document.documentElement.dataset.scheme === "dark" ? "dark" : "light";
    }

    function palette() {
        if (scheme() === "dark") {
            return {
                dot: "rgba(251, 182, 206, 0.64)",
                link: "rgba(251, 182, 206, 0.13)",
                pointer: "rgba(244, 114, 182, 0.46)",
                ring: "rgba(244, 114, 182, 0.5)"
            };
        }

        return {
            dot: "rgba(180, 84, 132, 0.46)",
            link: "rgba(236, 72, 153, 0.105)",
            pointer: "rgba(236, 72, 153, 0.4)",
            ring: "rgba(244, 114, 182, 0.38)"
        };
    }

    function clampSpeed(p, max) {
        const speed = Math.hypot(p.vx, p.vy);
        if (speed <= max) return;

        p.vx = (p.vx / speed) * max;
        p.vy = (p.vy / speed) * max;
    }

    function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const options = motionSettings();
        const count = Math.min(options.maxCount, Math.max(options.minCount, Math.floor((width * height) / options.density)));
        particles = Array.from({ length: count }, () => ({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * options.baseSpeed,
            vy: (Math.random() - 0.5) * options.baseSpeed,
            r: 0.9 + Math.random() * (options.mobile ? 1.1 : 1.5),
            wander: options.wanderMin + Math.random() * (options.wanderMax - options.wanderMin)
        }));
    }

    function explode(x, y) {
        const options = motionSettings();
        ripples.push({ x, y, radius: 0, life: 1 });
        collisionHeat = 1;

        for (const p of particles) {
            const dx = p.x - x;
            const dy = p.y - y;
            const distance = Math.max(Math.hypot(dx, dy), 1);
            if (distance > options.explosionRadius) continue;

            const force = Math.pow(1 - distance / options.explosionRadius, 1.4) * options.explosionForce + 0.45;
            p.vx += (dx / distance) * force;
            p.vy += (dy / distance) * force;
        }
    }

    function updateParticles() {
        const options = motionSettings();

        for (const p of particles) {
            p.vx += (Math.random() - 0.5) * p.wander;
            p.vy += (Math.random() - 0.5) * p.wander;

            if (pointer.active) {
                const dx = pointer.x - p.x;
                const dy = pointer.y - p.y;
                const distance = Math.max(Math.hypot(dx, dy), 1);

                if (distance < options.pointerRange) {
                    const attraction = Math.pow(1 - distance / options.pointerRange, 1.8) * options.pointerForce;
                    p.vx += (dx / distance) * attraction;
                    p.vy += (dy / distance) * attraction;
                }
            }

            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.985 - collisionHeat * 0.02;
            p.vy *= 0.985 - collisionHeat * 0.02;

            if (Math.abs(p.vx) < 0.04) p.vx += (Math.random() - 0.5) * 0.03;
            if (Math.abs(p.vy) < 0.04) p.vy += (Math.random() - 0.5) * 0.03;
            clampSpeed(p, options.maxSpeed);

            if (p.x < 0 || p.x > width) {
                p.vx *= -0.86;
                p.x = Math.max(0, Math.min(width, p.x));
            }
            if (p.y < 0 || p.y > height) {
                p.vy *= -0.86;
                p.y = Math.max(0, Math.min(height, p.y));
            }
        }
    }

    function resolveCollisions() {
        const options = motionSettings();
        const minDistance = options.minCollisionDistance;
        const push = options.collisionPush + collisionHeat * (options.mobile ? 0.72 : 1.1);

        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const a = particles[i];
                const b = particles[j];
                const dx = b.x - a.x;
                const dy = b.y - a.y;
                const distance = Math.max(Math.hypot(dx, dy), 0.01);
                if (distance > minDistance) continue;

                const nx = dx / distance;
                const ny = dy / distance;
                const overlap = (minDistance - distance) * push;
                a.x -= nx * overlap * 0.5;
                a.y -= ny * overlap * 0.5;
                b.x += nx * overlap * 0.5;
                b.y += ny * overlap * 0.5;

                const relativeVelocity = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
                if (relativeVelocity < 0) {
                    const impulse = relativeVelocity * -0.72;
                    a.vx -= nx * impulse;
                    a.vy -= ny * impulse;
                    b.vx += nx * impulse;
                    b.vy += ny * impulse;
                }
            }
        }
    }

    function drawLinks(colors) {
        const options = motionSettings();

        for (let i = 0; i < particles.length; i++) {
            const a = particles[i];

            if (pointer.active) {
                const dx = a.x - pointer.x;
                const dy = a.y - pointer.y;
                const pointerDistance = Math.hypot(dx, dy);
                if (pointerDistance < options.pointerLineDistance) {
                    ctx.globalAlpha = Math.pow(1 - pointerDistance / options.pointerLineDistance, 1.3) * (options.mobile ? 0.58 : 0.82);
                    ctx.strokeStyle = colors.pointer;
                    ctx.lineWidth = options.mobile ? 0.8 : 1;
                    ctx.beginPath();
                    ctx.moveTo(pointer.x, pointer.y);
                    ctx.lineTo(a.x, a.y);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }

            for (let j = i + 1; j < particles.length; j++) {
                const b = particles[j];
                const dx = b.x - a.x;
                const dy = b.y - a.y;
                const distance = Math.hypot(dx, dy);
                if (distance > options.linkDistance) continue;

                ctx.globalAlpha = (1 - distance / options.linkDistance) * (options.mobile ? 0.34 : 0.54);
                ctx.strokeStyle = colors.link;
                ctx.lineWidth = options.mobile ? 0.8 : 0.9;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
    }

    function drawRipples(colors) {
        const options = motionSettings();

        ripples = ripples.filter((ripple) => {
            ripple.radius += options.rippleStep + collisionHeat * options.rippleHeatStep;
            ripple.life -= 0.025;

            ctx.globalAlpha = Math.max(ripple.life, 0) * 0.8;
            ctx.strokeStyle = colors.ring;
            ctx.lineWidth = 1.4 + ripple.life * 1.4;
            ctx.beginPath();
            ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;

            return ripple.life > 0;
        });
    }

    function drawDots(colors) {
        for (const p of particles) {
            ctx.beginPath();
            ctx.fillStyle = colors.dot;
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function draw() {
        frame = requestAnimationFrame(draw);
        ctx.clearRect(0, 0, width, height);
        const colors = palette();

        updateParticles();
        resolveCollisions();
        drawLinks(colors);
        drawRipples(colors);
        drawDots(colors);

        collisionHeat *= 0.95;
    }

    window.addEventListener("resize", resize, { passive: true });
    window.addEventListener("pointermove", (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
        pointer.active = true;
    }, { passive: true });
    window.addEventListener("pointerdown", (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
        pointer.active = true;
        explode(event.clientX, event.clientY);
    }, { passive: true });
    window.addEventListener("pointerleave", () => {
        pointer.active = false;
    }, { passive: true });
    window.addEventListener("beforeunload", () => cancelAnimationFrame(frame));

    resize();
    draw();
})();
</script>
<script>
(() => {
    const links = document.querySelectorAll(".sidebar-social-icons a[href^='http']");

    links.forEach((link) => {
        link.addEventListener("click", (event) => {
            if (
                event.defaultPrevented ||
                event.button !== 0 ||
                event.metaKey ||
                event.ctrlKey ||
                event.shiftKey ||
                event.altKey
            ) return;

            event.preventDefault();

            const opened = window.open(link.href, "_blank");
            if (opened) {
                opened.opener = null;
                return;
            }

            window.location.assign(link.href);
        });
    });
})();
</script>
<script>
(() => {
    const form = document.querySelector(".sidebar-search-form");
    const input = form?.querySelector("input");
    const results = document.querySelector(".sidebar-search-results");
    const jsonURL = form?.dataset.json;

    if (!form || !input || !results || !jsonURL) return;

    let pages = null;
    let controller = null;

    function normalize(text) {
        return String(text || "").toLowerCase().trim();
    }

    function escapeHTML(text) {
        return String(text || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#039;");
    }

    async function loadPages() {
        if (pages) return pages;

        pages = await fetch(jsonURL, { signal: controller?.signal }).then((response) => response.json());
        return pages;
    }

    function render(items, keyword) {
        if (!keyword) {
            results.hidden = true;
            results.innerHTML = "";
            return;
        }

        results.hidden = false;

        if (items.length === 0) {
            results.innerHTML = `<p class="sidebar-search-empty">没有找到相关内容</p>`;
            return;
        }

        results.innerHTML = items.slice(0, 6).map((item) => `
            <a class="sidebar-search-result" href="${item.permalink}">
                <strong>${escapeHTML(item.title)}</strong>
                <span>${escapeHTML(String(item.content || "").replace(/\s+/g, " ").slice(0, 54))}</span>
            </a>
        `).join("");
    }

    async function search() {
        const keyword = normalize(input.value);
        if (!keyword) {
            render([], "");
            return;
        }

        controller?.abort();
        controller = new AbortController();

        try {
            const data = await loadPages();
            const words = keyword.split(/\s+/).filter(Boolean);
            const matches = data
                .map((page) => {
                    const title = normalize(page.title);
                    const content = normalize(page.content);
                    const score = words.reduce((sum, word) => {
                        if (title.includes(word)) return sum + 3;
                        if (content.includes(word)) return sum + 1;
                        return sum;
                    }, 0);
                    return { ...page, score };
                })
                .filter((page) => page.score > 0)
                .sort((a, b) => b.score - a.score);

            render(matches, keyword);
        } catch (error) {
            if (error.name !== "AbortError") {
                results.hidden = false;
                results.innerHTML = `<p class="sidebar-search-empty">搜索暂时不可用</p>`;
            }
        }
    }

    form.addEventListener("submit", (event) => {
        event.preventDefault();
        const firstResult = results.querySelector("a");
        if (firstResult) firstResult.click();
    });

    input.addEventListener("input", search);
    input.addEventListener("focus", search);

    document.addEventListener("click", (event) => {
        if (!form.contains(event.target) && !results.contains(event.target)) {
            results.hidden = true;
        }
    });
})();
</script>
