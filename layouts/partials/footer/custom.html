<canvas id="site-particles" aria-hidden="true"></canvas>
<script>
(() => {
    const canvas = document.getElementById("site-particles");
    if (
        !canvas ||
        window.matchMedia("(prefers-reduced-motion: reduce)").matches
    ) return;

    const ctx = canvas.getContext("2d");
    if (!ctx) return;

    const pointer = { x: 0, y: 0, active: false };
    let width = 0;
    let height = 0;
    let particles = [];
    let ripples = [];
    let frame = 0;
    let collisionHeat = 0;

    function mobileMode() {
        return window.matchMedia("(max-width: 767px)").matches ||
            window.matchMedia("(pointer: coarse)").matches;
    }

    function motionSettings() {
        const mobile = mobileMode();

        return {
            mobile,
            minCount: mobile ? 20 : 36,
            maxCount: mobile ? 44 : 90,
            density: mobile ? 26000 : 18000,
            baseSpeed: mobile ? 0.34 : 0.55,
            wanderMin: mobile ? 0.002 : 0.003,
            wanderMax: mobile ? 0.005 : 0.01,
            pointerRange: mobile ? 130 : 190,
            pointerForce: mobile ? 0.052 : 0.085,
            pointerLineDistance: mobile ? 124 : 170,
            linkDistance: mobile ? 86 : 116,
            explosionRadius: mobile ? 240 : 360,
            explosionForce: mobile ? 5.8 : 9.5,
            maxSpeed: mobile ? 2.55 : 3.8,
            minCollisionDistance: mobile ? 12 : 15,
            collisionPush: mobile ? 0.22 : 0.32,
            rippleStep: mobile ? 5.5 : 8,
            rippleHeatStep: mobile ? 1.6 : 3
        };
    }

    function scheme() {
        return document.documentElement.dataset.scheme === "dark" ? "dark" : "light";
    }

    function palette() {
        if (scheme() === "dark") {
            return {
                dot: "rgba(251, 182, 206, 0.72)",
                link: "rgba(251, 182, 206, 0.18)",
                pointer: "rgba(244, 114, 182, 0.58)",
                ring: "rgba(244, 114, 182, 0.5)"
            };
        }

        return {
            dot: "rgba(180, 84, 132, 0.5)",
            link: "rgba(236, 72, 153, 0.14)",
            pointer: "rgba(236, 72, 153, 0.48)",
            ring: "rgba(244, 114, 182, 0.38)"
        };
    }

    function clampSpeed(p, max) {
        const speed = Math.hypot(p.vx, p.vy);
        if (speed <= max) return;

        p.vx = (p.vx / speed) * max;
        p.vy = (p.vy / speed) * max;
    }

    function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const options = motionSettings();
        const count = Math.min(options.maxCount, Math.max(options.minCount, Math.floor((width * height) / options.density)));
        particles = Array.from({ length: count }, () => ({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * options.baseSpeed,
            vy: (Math.random() - 0.5) * options.baseSpeed,
            r: 0.9 + Math.random() * (options.mobile ? 1.1 : 1.5),
            wander: options.wanderMin + Math.random() * (options.wanderMax - options.wanderMin)
        }));
    }

    function explode(x, y) {
        const options = motionSettings();
        ripples.push({ x, y, radius: 0, life: 1 });
        collisionHeat = 1;

        for (const p of particles) {
            const dx = p.x - x;
            const dy = p.y - y;
            const distance = Math.max(Math.hypot(dx, dy), 1);
            if (distance > options.explosionRadius) continue;

            const force = Math.pow(1 - distance / options.explosionRadius, 1.4) * options.explosionForce + 0.45;
            p.vx += (dx / distance) * force;
            p.vy += (dy / distance) * force;
        }
    }

    function updateParticles() {
        const options = motionSettings();

        for (const p of particles) {
            p.vx += (Math.random() - 0.5) * p.wander;
            p.vy += (Math.random() - 0.5) * p.wander;

            if (pointer.active) {
                const dx = pointer.x - p.x;
                const dy = pointer.y - p.y;
                const distance = Math.max(Math.hypot(dx, dy), 1);

                if (distance < options.pointerRange) {
                    const attraction = Math.pow(1 - distance / options.pointerRange, 1.8) * options.pointerForce;
                    p.vx += (dx / distance) * attraction;
                    p.vy += (dy / distance) * attraction;
                }
            }

            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.985 - collisionHeat * 0.02;
            p.vy *= 0.985 - collisionHeat * 0.02;

            if (Math.abs(p.vx) < 0.04) p.vx += (Math.random() - 0.5) * 0.03;
            if (Math.abs(p.vy) < 0.04) p.vy += (Math.random() - 0.5) * 0.03;
            clampSpeed(p, options.maxSpeed);

            if (p.x < 0 || p.x > width) {
                p.vx *= -0.86;
                p.x = Math.max(0, Math.min(width, p.x));
            }
            if (p.y < 0 || p.y > height) {
                p.vy *= -0.86;
                p.y = Math.max(0, Math.min(height, p.y));
            }
        }
    }

    function resolveCollisions() {
        const options = motionSettings();
        const minDistance = options.minCollisionDistance;
        const push = options.collisionPush + collisionHeat * (options.mobile ? 0.72 : 1.1);

        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const a = particles[i];
                const b = particles[j];
                const dx = b.x - a.x;
                const dy = b.y - a.y;
                const distance = Math.max(Math.hypot(dx, dy), 0.01);
                if (distance > minDistance) continue;

                const nx = dx / distance;
                const ny = dy / distance;
                const overlap = (minDistance - distance) * push;
                a.x -= nx * overlap * 0.5;
                a.y -= ny * overlap * 0.5;
                b.x += nx * overlap * 0.5;
                b.y += ny * overlap * 0.5;

                const relativeVelocity = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
                if (relativeVelocity < 0) {
                    const impulse = relativeVelocity * -0.72;
                    a.vx -= nx * impulse;
                    a.vy -= ny * impulse;
                    b.vx += nx * impulse;
                    b.vy += ny * impulse;
                }
            }
        }
    }

    function drawLinks(colors) {
        const options = motionSettings();

        for (let i = 0; i < particles.length; i++) {
            const a = particles[i];

            if (pointer.active) {
                const dx = a.x - pointer.x;
                const dy = a.y - pointer.y;
                const pointerDistance = Math.hypot(dx, dy);
                if (pointerDistance < options.pointerLineDistance) {
                    ctx.globalAlpha = Math.pow(1 - pointerDistance / options.pointerLineDistance, 1.3) * (options.mobile ? 0.72 : 1);
                    ctx.strokeStyle = colors.pointer;
                    ctx.lineWidth = options.mobile ? 0.9 : 1.2;
                    ctx.beginPath();
                    ctx.moveTo(pointer.x, pointer.y);
                    ctx.lineTo(a.x, a.y);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }

            for (let j = i + 1; j < particles.length; j++) {
                const b = particles[j];
                const dx = b.x - a.x;
                const dy = b.y - a.y;
                const distance = Math.hypot(dx, dy);
                if (distance > options.linkDistance) continue;

                ctx.globalAlpha = (1 - distance / options.linkDistance) * (options.mobile ? 0.45 : 0.75);
                ctx.strokeStyle = colors.link;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
    }

    function drawRipples(colors) {
        const options = motionSettings();

        ripples = ripples.filter((ripple) => {
            ripple.radius += options.rippleStep + collisionHeat * options.rippleHeatStep;
            ripple.life -= 0.025;

            ctx.globalAlpha = Math.max(ripple.life, 0) * 0.8;
            ctx.strokeStyle = colors.ring;
            ctx.lineWidth = 1.4 + ripple.life * 1.4;
            ctx.beginPath();
            ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;

            return ripple.life > 0;
        });
    }

    function drawDots(colors) {
        for (const p of particles) {
            ctx.beginPath();
            ctx.fillStyle = colors.dot;
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function draw() {
        frame = requestAnimationFrame(draw);
        ctx.clearRect(0, 0, width, height);
        const colors = palette();

        updateParticles();
        resolveCollisions();
        drawLinks(colors);
        drawRipples(colors);
        drawDots(colors);

        collisionHeat *= 0.95;
    }

    window.addEventListener("resize", resize, { passive: true });
    window.addEventListener("pointermove", (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
        pointer.active = true;
    }, { passive: true });
    window.addEventListener("pointerdown", (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
        pointer.active = true;
        explode(event.clientX, event.clientY);
    }, { passive: true });
    window.addEventListener("pointerleave", () => {
        pointer.active = false;
    }, { passive: true });
    window.addEventListener("beforeunload", () => cancelAnimationFrame(frame));

    resize();
    draw();
})();
</script>
<script>
(() => {
    const links = document.querySelectorAll(".sidebar-social-icons a[href^='http']");

    links.forEach((link) => {
        link.addEventListener("click", (event) => {
            if (
                event.defaultPrevented ||
                event.button !== 0 ||
                event.metaKey ||
                event.ctrlKey ||
                event.shiftKey ||
                event.altKey
            ) return;

            event.preventDefault();

            const opened = window.open(link.href, "_blank");
            if (opened) {
                opened.opener = null;
                return;
            }

            window.location.assign(link.href);
        });
    });
})();
</script>
<script>
(() => {
    const form = document.querySelector(".sidebar-search-form");
    const input = form?.querySelector("input");
    const results = document.querySelector(".sidebar-search-results");
    const jsonURL = form?.dataset.json;

    if (!form || !input || !results || !jsonURL) return;

    let pages = null;
    let controller = null;

    function normalize(text) {
        return String(text || "").toLowerCase().trim();
    }

    function escapeHTML(text) {
        return String(text || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#039;");
    }

    async function loadPages() {
        if (pages) return pages;

        pages = await fetch(jsonURL, { signal: controller?.signal }).then((response) => response.json());
        return pages;
    }

    function render(items, keyword) {
        if (!keyword) {
            results.hidden = true;
            results.innerHTML = "";
            return;
        }

        results.hidden = false;

        if (items.length === 0) {
            results.innerHTML = `<p class="sidebar-search-empty">没有找到相关内容</p>`;
            return;
        }

        results.innerHTML = items.slice(0, 6).map((item) => `
            <a class="sidebar-search-result" href="${item.permalink}">
                <strong>${escapeHTML(item.title)}</strong>
                <span>${escapeHTML(String(item.content || "").replace(/\s+/g, " ").slice(0, 54))}</span>
            </a>
        `).join("");
    }

    async function search() {
        const keyword = normalize(input.value);
        if (!keyword) {
            render([], "");
            return;
        }

        controller?.abort();
        controller = new AbortController();

        try {
            const data = await loadPages();
            const words = keyword.split(/\s+/).filter(Boolean);
            const matches = data
                .map((page) => {
                    const title = normalize(page.title);
                    const content = normalize(page.content);
                    const score = words.reduce((sum, word) => {
                        if (title.includes(word)) return sum + 3;
                        if (content.includes(word)) return sum + 1;
                        return sum;
                    }, 0);
                    return { ...page, score };
                })
                .filter((page) => page.score > 0)
                .sort((a, b) => b.score - a.score);

            render(matches, keyword);
        } catch (error) {
            if (error.name !== "AbortError") {
                results.hidden = false;
                results.innerHTML = `<p class="sidebar-search-empty">搜索暂时不可用</p>`;
            }
        }
    }

    form.addEventListener("submit", (event) => {
        event.preventDefault();
        const firstResult = results.querySelector("a");
        if (firstResult) firstResult.click();
    });

    input.addEventListener("input", search);
    input.addEventListener("focus", search);

    document.addEventListener("click", (event) => {
        if (!form.contains(event.target) && !results.contains(event.target)) {
            results.hidden = true;
        }
    });
})();
</script>
